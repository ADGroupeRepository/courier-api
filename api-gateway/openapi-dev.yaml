  License:
    type: object
    properties:
      id: { type: string }
      subscriptionId: { type: string }
      orgId: { type: string }
      userId: { type: string }
      assignedBy: { type: string }
      assignedAt: { type: string }
      isActive: { type: boolean }

  UserProfile:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      email: { type: string }
      phone: { type: string }
      avatarUrl: { type: string }

  OrganisationProfileItem:
    type: object
    properties:
