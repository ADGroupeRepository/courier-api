swagger: '2.0'
info:
  title: Bara API - Development
  description: API Gateway Specification for Bara API (Development Environment)
  version: 1.0.0
schemes:
  - https
produces:
  - application/json


x-google-backend:
  # The /api/v1 suffix will automatically be prepended to all paths below
  address: 'https://backend-dev-n4xxd6pd2q-ew.a.run.app/api/v1'
  path_translation: APPEND_PATH_TO_ADDRESS

x-google-management:
  metrics:
    - name: 'all-requests'
      displayName: 'Total Requests'
      valueType: INT64
      metricKind: DELTA
    - name: 'auth-requests'
      displayName: 'Authentication Requests'
      valueType: INT64
      metricKind: DELTA
  quota:
    limits:
      - name: 'all-limit'
        metric: 'all-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 1000
      - name: 'auth-limit'
        metric: 'auth-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 20

paths:
  /:
    get:
      summary: Health Check
      operationId: healthCheck
      # We override the backend here because the health check is at the root (/), not /api/v1/
      x-google-backend:
        address: 'https://backend-dev-n4xxd6pd2q-ew.a.run.app/'
        path_translation: CONSTANT_ADDRESS
      responses:
        '200':
          description: Success

  /auth/signup:
    post:
      summary: Inscription (Signup)
      operationId: signup
      x-google-quota:
        metricCosts:
          'auth-requests': 1
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /auth/login:
    post:
      summary: Connexion (Login)
      operationId: login
      x-google-quota:
        metricCosts:
          'auth-requests': 1
      responses:
        '200':
          description: Success

  /auth/profile:
    get:
      summary: Profil Utilisateur (Profile)
      operationId: getProfile
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success

  /auth/logout:
    post:
      summary: Déconnexion (Logout)
      operationId: logout
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
        '204':
          description: No Content

  /auth/profile/avatar:
    post:
      summary: Uploader un Avatar
      operationId: uploadAvatar
      consumes:
        - multipart/form-data
      parameters:
        - name: avatar
          in: formData
          type: string
          required: true
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer l'Avatar
      operationId: deleteAvatar
      responses:
        '200':
          description: Success

  /organisations:
    get:
      summary: Lister les organisations
      operationId: listOrganisations
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
    post:
      summary: Créer une organisation
      operationId: createOrganisation
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /organisations/{orgId}:
    get:
      summary: Voir une organisation
      operationId: getOrganisation
      x-google-quota:
        metricCosts:
          'all-requests': 1
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Mettre à jour une organisation
      operationId: updateOrganisation
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer une organisation
      operationId: deleteOrganisation
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content

  /organisations/{orgId}/logo:
    post:
      summary: Uploader le Logo
      operationId: uploadOrganisationLogo
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: logo
          in: formData
          type: string
          required: true
      responses:
        '200':
          description: Success

  /organisations/{orgId}/members:
    get:
      summary: Lister les membres
      operationId: listMembers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Ajouter un membre
      operationId: addMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /organisations/{orgId}/members/{memberId}:
    get:
      summary: Voir un membre
      operationId: getMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier les rôles d'un membre
      operationId: updateMemberRoles
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Retirer un membre
      operationId: removeMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /modules:
    get:
      summary: Lister les modules disponibles
      operationId: listAvailableModules
      responses:
        '200':
          description: Success

  /organisations/{orgId}/modules:
    get:
      summary: Lister les modules actifs
      operationId: listActiveModules
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Activer un module
      operationId: activateModule
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/modules/{module}:
    delete:
      summary: Désactiver un module
      operationId: deactivateModule
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: module
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /admin/marketplace:
    post:
      summary: Publier un module
      operationId: publishModule
      responses:
        '200':
          description: Success

  /admin/marketplace/{moduleName}:
    delete:
      summary: Dépublier un module
      operationId: unpublishModule
      parameters:
        - name: moduleName
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/departments:
    get:
      summary: Lister les départements
      operationId: listDepartments
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Créer un département
      operationId: createDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '201':
          description: Created

  /organisations/{orgId}/departments/{id}:
    get:
      summary: Voir un département
      operationId: getDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier un département
      operationId: updateDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un département
      operationId: deleteDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/members/{membershipId}/department:
    post:
      summary: Assigner à un département
      operationId: assignMemberToDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: membershipId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/departments/{id}/members:
    get:
      summary: Lister les membres d'un département
      operationId: listDepartmentMembers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/profiles/{id}:
    delete:
      summary: Retirer d'un département
      operationId: unassignMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/couriers:
    get:
      summary: Lister les courriers
      operationId: listCouriers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: query
          required: false
          type: string
          enum: [incoming, outgoing]
      responses:
        '200':
          description: Success
    post:
      summary: Créer un courrier
      operationId: createCourier
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: formData
          type: string
          enum: [incoming, outgoing]
          required: true
        - name: subject
          in: formData
          type: string
          required: true
        - name: sender
          in: formData
          type: string
        - name: recipient
          in: formData
          type: string
        - name: assignedTo
          in: formData
          type: string
          required: true
        - name: targetType
          in: formData
          type: string
          enum: [user, department]
          required: true
        - name: file
          in: formData
          type: string
      responses:
        '201':
          description: Created
  /organisations/{orgId}/couriers/{id}:
    get:
      summary: Voir un courrier
      operationId: getCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un courrier
      operationId: updateCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un courrier
      operationId: deleteCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Courier'

definitions:
  Courier:
    type: object
    properties:
      id: { type: string }
      type: { type: string, enum: [incoming, outgoing] }
      subject: { type: string }
      sender: { type: string }
      recipient: { type: string }
      assignedTo: { type: string }
      targetType: { type: string, enum: [user, department] }
      fileUrl: { type: string }
      status: { type: string }
      createdAt: { type: string }
      updatedAt: { type: string }
