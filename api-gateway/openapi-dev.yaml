    properties:
      id: { type: string }
      type: { type: string, enum: [incoming, outgoing] }
      urgency: { type: string, enum: [normal, urgent, very_urgent] }
      subject: { type: string }
      senderName: { type: string }
      senderNumber: { type: string }
      senderStructureType: { type: string, enum: [physique, privee, publique, ong, autre] }
      senderStructureName: { type: string }
      senderIdNumber: { type: string }
      senderPhone: { type: string }
      senderEmail: { type: string }
      assignedTo: { type: string }
      targetType: { type: string, enum: [user, department] }
      fileUrl: { type: string }
      status: { type: string }
      isFavorite: { type: boolean }
      isArchived: { type: boolean }
      createdAt: { type: string }
      updatedAt: { type: string }

  Plan:
