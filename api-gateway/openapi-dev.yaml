swagger: '2.0'
info:
  title: Bara API - Development
  description: API Gateway Specification for Bara API (Development Environment)
  version: 1.0.0
schemes:
  - https
produces:
  - application/json

x-google-backend:
  # The /api/v1 suffix will automatically be prepended to all paths below
  address: 'https://backend-dev-n4xxd6pd2q-ew.a.run.app/api/v1'
  path_translation: APPEND_PATH_TO_ADDRESS

x-google-management:
  metrics:
    - name: 'all-requests'
      displayName: 'Total Requests'
      valueType: INT64
      metricKind: DELTA
    - name: 'auth-requests'
      displayName: 'Authentication Requests'
      valueType: INT64
      metricKind: DELTA
  quota:
    limits:
      - name: 'all-limit'
        metric: 'all-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 1000
      - name: 'auth-limit'
        metric: 'auth-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 20

paths:
  /:
    get:
      summary: Health Check
      operationId: healthCheck
      # We override the backend here because the health check is at the root (/), not /api/v1/
      x-google-backend:
        address: 'https://backend-dev-n4xxd6pd2q-ew.a.run.app/'
        path_translation: CONSTANT_ADDRESS
      responses:
        '200':
          description: Success

  /auth/signup:
    post:
      summary: Inscription (Signup)
      operationId: signup
      x-google-quota:
        metricCosts:
          'auth-requests': 1
      responses:
        '200':
          description: Success
        '201':
          description: Created


  /auth/profile:
    get:
      summary: Profil Utilisateur (Profile)
      operationId: getProfile
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ProfileResponse'


  /auth/profile/avatar:
    post:
      summary: Uploader un Avatar
      operationId: uploadAvatar
      consumes:
        - multipart/form-data
      parameters:
        - name: avatar
          in: formData
          type: string
          required: true
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer l'Avatar
      operationId: deleteAvatar
      responses:
        '200':
          description: Success

  /organisations:
    get:
      summary: Lister les organisations
      operationId: listOrganisations
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
    post:
      summary: Créer une organisation
      operationId: createOrganisation
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /organisations/{orgId}:
    get:
      summary: Voir une organisation
      operationId: getOrganisation
      x-google-quota:
        metricCosts:
          'all-requests': 1
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Mettre à jour une organisation
      operationId: updateOrganisation
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer une organisation
      operationId: deleteOrganisation
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content

  /organisations/{orgId}/logo:
    post:
      summary: Uploader le Logo
      operationId: uploadOrganisationLogo
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: logo
          in: formData
          type: string
          required: true
      responses:
        '200':
          description: Success

  /organisations/{orgId}/members:
    get:
      summary: Lister les membres
      operationId: listMembers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Ajouter un membre
      operationId: addMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /organisations/{orgId}/members/{memberId}:
    get:
      summary: Voir un membre
      operationId: getMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier les rôles d'un membre
      operationId: updateMemberRoles
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Retirer un membre
      operationId: removeMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /modules:
    get:
      summary: Lister les modules disponibles
      operationId: listAvailableModules
      responses:
        '200':
          description: Success

  /organisations/{orgId}/modules:
    get:
      summary: Lister les modules actifs
      operationId: listActiveModules
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Activer un module
      operationId: activateModule
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/modules/{module}:
    delete:
      summary: Désactiver un module
      operationId: deactivateModule
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: module
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /admin/marketplace:
    post:
      summary: Publier un module
      operationId: publishModule
      responses:
        '200':
          description: Success

  /admin/marketplace/{moduleName}:
    delete:
      summary: Dépublier un module
      operationId: unpublishModule
      parameters:
        - name: moduleName
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/departments:
    get:
      summary: Lister les départements
      operationId: listDepartments
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Créer un département
      operationId: createDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '201':
          description: Created

  /organisations/{orgId}/departments/{id}:
    get:
      summary: Voir un département
      operationId: getDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier un département
      operationId: updateDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un département
      operationId: deleteDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/members/{membershipId}/department:
    post:
      summary: Assigner à un département
      operationId: assignMemberToDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: membershipId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/departments/{id}/members:
    get:
      summary: Lister les membres d'un département
      operationId: listDepartmentMembers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/profiles/{id}:
    delete:
      summary: Retirer d'un département
      operationId: unassignMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/couriers:
    get:
      summary: Lister les courriers
      operationId: listCouriers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: query
          required: false
          type: string
          enum: [incoming, outgoing]
      responses:
        '200':
          description: Success
    post:
      summary: Créer un courrier
      operationId: createCourier
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: formData
          type: string
          enum: [incoming, outgoing]
          required: true
        - name: subject
          in: formData
          type: string
          required: true
        - name: sender
          in: formData
          type: string
        - name: recipient
          in: formData
          type: string
        - name: assignedTo
          in: formData
          type: string
          required: true
        - name: targetType
          in: formData
          type: string
          enum: [user, department]
          required: true
        - name: file
          in: formData
          type: string
      responses:
        '201':
          description: Created
  /organisations/{orgId}/couriers/{id}:
    get:
      summary: Voir un courrier
      operationId: getCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un courrier
      operationId: updateCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un courrier
      operationId: deleteCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Courier'

  /organisations/{orgId}/couriers/{id}/force:
    delete:
      summary: Supprimer définitivement un courrier (Force delete courier)
      operationId: forceDeleteCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/restore:
    post:
      summary: Restaurer un courrier du panier (Restore courier from bin)
      operationId: restoreCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Courier'
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/messages:
    get:
      summary: Lister les messages de chat d'un courrier (List courier chat messages)
      operationId: listCourierMessages
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
        - name: offset
          in: query
          required: false
          type: integer
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              total: { type: integer }
              documents:
                type: array
                items:
                  $ref: '#/definitions/CourierMessage'
    post:
      summary: Envoyer un message de chat pour un courrier (Send courier chat message)
      operationId: createCourierMessage
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: content
          in: formData
          type: string
          required: true
        - name: file
          in: formData
          type: file
          required: false
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/CourierMessage'

  /organisations/{orgId}/couriers/{id}/replies:
    get:
      summary: Lister les réponses d'un courrier (List courier replies)
      operationId: listCourierReplies
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
        - name: offset
          in: query
          required: false
          type: integer
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              total: { type: integer }
              documents:
                type: array
                items:
                  $ref: '#/definitions/CourierReply'
    post:
      summary: Créer une réponse pour un courrier (Create courier reply)
      operationId: createCourierReply
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: content
          in: formData
          type: string
          required: true
        - name: file
          in: formData
          type: file
          required: false
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/CourierReply'

  /organisations/{orgId}/couriers/{id}/replies/{replyId}:
    patch:
      summary: Modifier une réponse de courrier (Update courier reply)
      operationId: updateCourierReply
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: replyId
          in: path
          required: true
          type: string
        - name: x-org-id
          in: header
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              documentStatus:
                type: string
                enum: [draft, finalized]
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/CourierReply'

  /organisations/{orgId}/contacts:
    get:
      summary: Lister les contacts externes (List external contacts)
      operationId: listExternalContacts
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/ExternalContact'
    post:
      summary: Créer un contact externe (Create external contact)
      operationId: createExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - name
              - structureType
            properties:
              name: { type: string }
              email: { type: string }
              phone: { type: string }
              structureType:
                type: string
                enum: [physique, privee, publique, ong, autre]
              structureName: { type: string }
              idNumber: { type: string }
              address: { type: string }
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/ExternalContact'

  /organisations/{orgId}/contacts/{id}:
    get:
      summary: Voir un contact externe (Show external contact)
      operationId: getExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/ExternalContact'
    patch:
      summary: Modifier un contact externe (Update external contact)
      operationId: updateExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              name: { type: string }
              email: { type: string }
              phone: { type: string }
              structureType:
                type: string
                enum: [physique, privee, publique, ong, autre]
              structureName: { type: string }
              idNumber: { type: string }
              address: { type: string }
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/ExternalContact'
    delete:
      summary: Supprimer un contact externe (Delete external contact)
      operationId: deleteExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              message: { type: string }

  /plans:
    get:
      summary: Lister les plans actifs (List active plans)
      operationId: listActivePlans
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/Plan'

  /plans/{planId}:
    get:
      summary: Voir un plan actif (Show active plan)
      operationId: showActivePlan
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Plan'
        '404':
          description: Plan not found

  /organisations/{orgId}/subscription:
    get:
      summary: Voir l'abonnement actif (Show active subscription and usage)
      operationId: getOrganisationSubscription
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: S'abonner à un plan (Subscribe to a plan)
      operationId: subscribeToPlan
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - planId
            properties:
              planId:
                type: string
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Subscription'
              message: { type: string }

  /organisations/{orgId}/licenses:
    get:
      summary: Lister les licences de sièges (List seat licenses)
      operationId: listSeatLicenses
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/licenses/assign:
    post:
      summary: Assigner une licence de siège (Assign seat license)
      operationId: assignSeatLicense
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/License'

  /organisations/{orgId}/licenses/revoke:
    post:
      summary: Révoquer une licence de siège (Revoke seat license)
      operationId: revokeSeatLicense
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
      responses:
        '200':
          description: Success

  /admin/plans:
    get:
      summary: Lister les plans (Admin)
      operationId: adminListPlans
      responses:
        '200':
          description: Success
    post:
      summary: Créer un plan (Admin)
      operationId: adminCreatePlan
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Plan'
      responses:
        '201':
          description: Created

  /admin/plans/{planId}:
    patch:
      summary: Modifier un plan (Admin)
      operationId: adminUpdatePlan
      parameters:
        - name: planId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              name: { type: string }
              slug: { type: string }
              description: { type: string }
              price: { type: number }
              maxMembers: { type: integer }
              maxStorageMB: { type: integer }
              maxCouriersPerMonth: { type: integer }
              maxModules: { type: integer }
              allowedModules:
                type: array
                items: { type: string }
              features:
                type: array
                items: { type: string }
              isActive: { type: boolean }
              sortOrder: { type: integer }
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un plan (Admin)
      operationId: adminDeletePlan
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /admin/plans/{planId}/usage:
    get:
      summary: Voir l'utilisation d'un plan (Admin - Get plan usage)
      operationId: adminGetPlanUsage
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  planId: { type: string }
                  planName: { type: string }
                  issuedSubscriptions: { type: integer }

  /admin/subscriptions:
    get:
      summary: Lister les abonnements (Admin)
      operationId: adminListSubscriptions
      responses:
        '200':
          description: Success
    post:
      summary: Émettre un abonnement (Admin)
      operationId: adminIssueSubscription
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - planId
              - orgId
              - totalSeatsPurchased
            properties:
              planId: { type: string }
              orgId: { type: string }
              totalSeatsPurchased: { type: integer }
              expiresAt: { type: string }
              notes: { type: string }
      responses:
        '201':
          description: Created

  /admin/subscriptions/{subscriptionId}:
    patch:
      summary: Modifier un abonnement (Admin)
      operationId: adminUpdateSubscription
      parameters:
        - name: subscriptionId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              isActive: { type: boolean }
              totalSeatsPurchased: { type: integer }
              expiresAt: { type: string }
              notes: { type: string }
      responses:
        '200':
          description: Success

definitions:
  Courier:
