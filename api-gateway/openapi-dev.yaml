swagger: '2.0'
info:
  title: Bara API - Development
  description: API Gateway Specification for Bara API (Development Environment)
  version: 1.0.0
schemes:
  - https
produces:
  - application/json
  
securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header

x-google-backend:
  # TODO: Replace this with your development Cloud Run URL
  # The /api/v1 suffix will automatically be prepended to all paths below
  address: "https://[YOUR_DEV_CLOUD_RUN_URL]/api/v1"
  path_translation: APPEND_PATH_TO_ADDRESS

x-google-management:
  metrics:
    - name: "all-requests"
      displayName: "Total Requests"
      valueType: INT64
      metricKind: DELTA
    - name: "auth-requests"
      displayName: "Authentication Requests"
      valueType: INT64
      metricKind: DELTA
  quota:
    limits:
      - name: "all-limit"
        metric: "all-requests"
        unit: "1/min/{project}"
        values:
          STANDARD: 1000
      - name: "auth-limit"
        metric: "auth-requests"
        unit: "1/min/{project}"
        values:
          STANDARD: 20

paths:
  /:
    get:
      summary: Health Check
      operationId: healthCheck
      # We override the backend here because the health check is at the root (/), not /api/v1/
      x-google-backend:
        address: "https://[YOUR_DEV_CLOUD_RUN_URL]/"
        path_translation: CONSTANT_ADDRESS
      responses:
        '200':
          description: Success
  /auth/signup:
    post:
      summary: Inscription (Signup)
      operationId: signup
      x-google-quota:
        metricCosts:
          "auth-requests": 1
      responses:
        '200':
          description: Success
        '201':
          description: Created
  /auth/login:
    post:
      summary: Connexion (Login)
      operationId: login
      x-google-quota:
        metricCosts:
          "auth-requests": 1
      responses:
        '200':
          description: Success
  /auth/profile:
    get:
      summary: Profil Utilisateur (Profile)
      operationId: getProfile
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          "all-requests": 1
      responses:
        '200':
          description: Success
  /auth/logout:
    post:
      summary: Déconnexion (Logout)
      operationId: logout
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          "all-requests": 1
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /auth/profile/avatar:
    post:
      summary: Uploader un Avatar
      operationId: uploadAvatar
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: avatar
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer l'Avatar
      operationId: deleteAvatar
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /organisations:
    get:
      summary: Lister les organisations
      operationId: listOrganisations
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          "all-requests": 1
      responses:
        '200':
          description: Success
    post:
      summary: Créer une organisation
      operationId: createOrganisation
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          "all-requests": 1
      responses:
        '200':
          description: Success
        '201':
          description: Created
  /organisations/{orgId}:
    get:
      summary: Voir une organisation
      operationId: getOrganisation
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          "all-requests": 1
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Mettre à jour une organisation
      operationId: updateOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer une organisation
      operationId: deleteOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /organisations/{orgId}/logo:
    post:
      summary: Uploader le Logo
      operationId: uploadOrganisationLogo
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: logo
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Success
  /organisations/{orgId}/members:
    get:
      summary: Lister les membres
      operationId: listMembers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Ajouter un membre
      operationId: addMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '201':
          description: Created
  /organisations/{orgId}/members/{memberId}:
    get:
      summary: Voir un membre
      operationId: getMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier les rôles d'un membre
      operationId: updateMemberRoles
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Retirer un membre
      operationId: removeMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /modules:
    get:
      summary: Lister les modules disponibles
      operationId: listAvailableModules
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /organisations/{orgId}/modules:
    get:
      summary: Lister les modules actifs
      operationId: listActiveModules
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Activer un module
      operationId: activateModule
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/modules/{module}:
    delete:
      summary: Désactiver un module
      operationId: deactivateModule
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: module
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /admin/marketplace:
    post:
      summary: Publier un module
      operationId: publishModule
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /admin/marketplace/{moduleName}:
    delete:
      summary: Dépublier un module
      operationId: unpublishModule
      security:
        - BearerAuth: []
      parameters:
        - name: moduleName
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/departments:
    get:
      summary: Lister les départements
      operationId: listDepartments
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Créer un département
      operationId: createDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '201':
          description: Created
  /organisations/{orgId}/departments/{id}:
    get:
      summary: Voir un département
      operationId: getDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier un département
      operationId: updateDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un département
      operationId: deleteDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/members/{membershipId}/department:
    post:
      summary: Assigner à un département
      operationId: assignMemberToDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: membershipId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/departments/{id}/members:
    get:
      summary: Lister les membres d'un département
      operationId: listDepartmentMembers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/profiles/{id}:
    delete:
      summary: Retirer d'un département
      operationId: unassignMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/couriers:
    get:
      summary: Lister les courriers
      operationId: listCouriers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: query
          required: false
          type: string
          enum: [incoming, outgoing]
      responses:
        '200':
          description: Success
    post:
      summary: Créer un courrier
      operationId: createCourier
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: formData
          type: string
          enum: [incoming, outgoing]
          required: true
        - name: subject
          in: formData
          type: string
          required: true
        - name: sender
          in: formData
          type: string
        - name: recipient
          in: formData
          type: string
        - name: assignedTo
          in: formData
          type: string
          required: true
        - name: targetType
          in: formData
          type: string
          enum: [user, department]
          required: true
        - name: file
          in: formData
          type: file
      responses:
        '201':
          description: Created
  /organisations/{orgId}/couriers/{id}:
    get:
      summary: Voir un courrier
      operationId: getCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un courrier
      operationId: updateCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un courrier
      operationId: deleteCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Courier'

definitions:
  Courier:
    type: object
    properties:
      id: { type: string }
      type: { type: string, enum: [incoming, outgoing] }
      subject: { type: string }
      sender: { type: string }
      recipient: { type: string }
      assignedTo: { type: string }
      targetType: { type: string, enum: [user, department] }
      fileUrl: { type: string }
      status: { type: string }
      createdAt: { type: string }
      updatedAt: { type: string }
