        type: array
        items: { type: string }
      features:
        type: array
        items: { type: string }
      isActive: { type: boolean }
      sortOrder: { type: integer }

  Subscription:
    type: object
    properties:
      id: { type: string }
      planId: { type: string }
      orgId: { type: string }
