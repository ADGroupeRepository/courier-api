swagger: '2.0'
info:
  title: Bara API - Development
  description: API Gateway Specification for Bara API (Development Environment)
  version: 1.0.0
schemes:
  - https
produces:
  - application/json

x-google-backend:
  # The /api/v1 suffix will automatically be prepended to all paths below
  address: 'https://backend-dev-n4xxd6pd2q-ew.a.run.app/api/v1'
  path_translation: APPEND_PATH_TO_ADDRESS

paths:
  /auth/signup:
    post:
      summary: Inscription (Signup)
      operationId: signup
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - name
              - email
              - password
            properties:
              name:
                type: string
              email:
                type: string
              phone:
                type: string
              password:
                type: string
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /auth/forgot-password:
    post:
      summary: Demander la réinitialisation du mot de passe (Request password reset)
      operationId: requestPasswordReset
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
              redirectUrl:
                type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Confirmer la réinitialisation du mot de passe (Confirm password reset)
      operationId: confirmPasswordReset
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
              - secret
              - password
            properties:
              userId:
                type: string
              secret:
                type: string
              password:
                type: string
      responses:
        '200':
          description: Success

  /auth/verify-email:
    post:
      summary: Demander la vérification de l'email (Request email verification)
      operationId: requestEmailVerification
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              redirectUrl:
                type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Confirmer la vérification de l'email (Confirm email verification)
      operationId: confirmEmailVerification
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
              - secret
            properties:
              userId:
                type: string
              secret:
                type: string
      responses:
        '200':
          description: Success

  /auth/profile:
    get:
      summary: Profil Utilisateur (Profile)
      operationId: getProfile
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ProfileResponse'
    patch:
      summary: Mettre à jour le profil (Update Profile)
      operationId: updateProfile
      consumes:
        - multipart/form-data
      parameters:
        - name: name
          in: formData
          required: false
          type: string
        - name: phone
          in: formData
          required: false
          type: string
        - name: avatar
          in: formData
          required: false
          type: string
          format: binary
          description: Multipart file part named avatar. Google API Gateway does not support Swagger type file.
        - name: signature
          in: formData
          required: false
          type: string
          format: binary
          description: Multipart file part named signature. Google API Gateway does not support Swagger type file.
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ProfileResponse'

  /organisations:
    get:
      summary: Lister les organisations
      operationId: listOrganisations
      responses:
        '200':
          description: Success
    post:
      summary: Créer une organisation
      operationId: createOrganisation
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /organisations/{orgId}:
    get:
      summary: Voir une organisation
      operationId: getOrganisation
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Mettre à jour une organisation (Patch)
      operationId: patchOrganisation
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer une organisation
      operationId: deleteOrganisation
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content

  /organisations/{orgId}/logo:
    post:
      summary: Uploader le Logo
      operationId: uploadOrganisationLogo
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: logo
          in: formData
          required: true
          type: string
          format: binary
          description: Multipart file part named logo. Google API Gateway does not support Swagger type file.
      responses:
        '200':
          description: Success

  /organisations/{orgId}/members:
    get:
      summary: Lister les membres
      operationId: listMembers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Ajouter un membre
      operationId: addMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                format: email
              role:
                type: string
                enum: [admin, user]
              name:
                type: string
              departments:
                type: array
                items:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: string
                    role:
                      type: string
                      enum: [manager, member]
              jobTitle:
                type: string
                maxLength: 128
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /organisations/{orgId}/members/{memberId}:
    get:
      summary: Voir un membre
      operationId: getMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier les rôles d'un membre (Patch)
      operationId: patchMemberRoles
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Retirer un membre
      operationId: removeMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /modules:
    get:
      summary: Lister les modules disponibles
      operationId: listAvailableModules
      responses:
        '200':
          description: Success

  /organisations/{orgId}/modules:
    get:
      summary: Lister les modules actifs
      operationId: listActiveModules
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/modules/{module}:
    delete:
      summary: Désactiver un module
      operationId: deactivateModule
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: module
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /admin/marketplace:
    post:
      summary: Publier un module
      operationId: publishModule
      responses:
        '200':
          description: Success

  /admin/marketplace/{moduleName}:
    delete:
      summary: Dépublier un module
      operationId: unpublishModule
      parameters:
        - name: moduleName
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/departments:
    get:
      summary: Lister les départements
      operationId: listDepartments
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Créer un département
      operationId: createDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '201':
          description: Created

  /organisations/{orgId}/departments/{id}:
    get:
      summary: Voir un département
      operationId: getDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un département (Patch)
      operationId: patchDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un département
      operationId: deleteDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/departments/assign:
    post:
      summary: Assigner à un département
      operationId: assignMemberToDepartment
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
              - departmentId
            properties:
              userId:
                type: string
              departmentId:
                type: string
              jobTitle:
                type: string
              departmentRole:
                type: string
                enum: [manager, member]
      responses:
        '200':
          description: Success
        '404':
          description: User is not a member of this organisation

  /organisations/{orgId}/departments/{id}/members:
    get:
      summary: Lister les membres d'un département
      operationId: listDepartmentMembers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/profiles/{id}:
    delete:
      summary: Retirer d'un département
      operationId: unassignMember
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/notifications/read-all:
    patch:
      summary: Marquer toutes les notifications comme lues (Mark all notifications as read)
      operationId: markAllNotificationsAsRead
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/notifications/{id}/read:
    patch:
      summary: Marquer une notification comme lue (Mark notification as read)
      operationId: markNotificationAsRead
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/notifications:
    delete:
      summary: Supprimer des notifications en bloc (Delete notifications in bulk)
      operationId: deleteNotifications
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - ids
            properties:
              ids:
                type: array
                items:
                  type: string
      responses:
        '204':
          description: No Content
        '200':
          description: Success

  /organisations/{orgId}/notifications/{id}:
    delete:
      summary: Supprimer une notification (Delete single notification)
      operationId: deleteNotification
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '204':
          description: No Content
        '200':
          description: Success

  /organisations/{orgId}/couriers:
    get:
      summary: Lister les courriers
      operationId: listCouriers
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: query
          required: false
          type: string
          enum: [incoming, outgoing, internal]
      responses:
        '200':
          description: Success
    post:
      summary: Créer un courrier
      operationId: createCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - type
              - urgency
              - subject
              - targetType
              - entityIds
            properties:
              type:
                type: string
                enum: [incoming, outgoing, internal]
              urgency:
                type: string
                enum: [normal, urgent, very_urgent]
              subject: { type: string }
              targetType:
                type: string
                enum: [user, department]
              entityIds:
                type: array
                items: { type: string }
              receivedAt: { type: string }
              emittedAt: { type: string }
              senderName: { type: string }
              senderEmail: { type: string }
              senderPhone: { type: string }
              externalContactId:
                type: string
                description: Required for incoming/outgoing couriers
              externalContactType:
                type: string
                enum: [personne, entreprise_privee, organisation_publique, ONG, autre]
                description: Required for incoming/outgoing couriers
              fileIds:
                type: array
                items: { type: string }
                description: Appwrite file IDs uploaded through the upload-url flow.
      responses:
        '201':
          description: Created

  /organisations/{orgId}/couriers/upload-url:
    post:
      summary: Préparer les URLs d'upload direct pour documents courrier
      operationId: createCourierUploadUrl
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - files
            properties:
              files:
                type: array
                minItems: 1
                maxItems: 20
                items:
                  type: object
                  required:
                    - fileName
                    - size
                  properties:
                    fileName: { type: string }
                    contentType: { type: string }
                    size:
                      type: integer
                      maximum: 26214400
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/CourierUploadTarget'

  /organisations/{orgId}/couriers/{id}:
    get:
      summary: Voir un courrier
      operationId: getCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un courrier
      operationId: updateCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un courrier
      operationId: deleteCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Courier'

  /organisations/{orgId}/couriers/{id}/force:
    delete:
      summary: Supprimer définitivement un courrier (Force delete courier)
      operationId: forceDeleteCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/restore:
    post:
      summary: Restaurer un courrier du panier (Restore courier from bin)
      operationId: restoreCourier
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Courier'
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/messages:
    get:
      summary: Lister les messages de chat d'un courrier (List courier chat messages)
      operationId: listCourierMessages
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
        - name: offset
          in: query
          required: false
          type: integer
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              total: { type: integer }
              documents:
                type: array
                items:
                  $ref: '#/definitions/CourierMessage'
    post:
      summary: Envoyer un message de chat pour un courrier (Send courier chat message)
      operationId: createCourierMessage
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/CourierMessage'

  /organisations/{orgId}/couriers/{id}/replies:
    get:
      summary: Lister les réponses d'un courrier (List courier replies)
      operationId: listCourierReplies
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
        - name: offset
          in: query
          required: false
          type: integer
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              total: { type: integer }
              documents:
                type: array
                items:
                  $ref: '#/definitions/CourierReply'
    post:
      summary: Créer une réponse pour un courrier (Create courier reply)
      operationId: createCourierReply
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/CourierReply'

  /organisations/{orgId}/couriers/{id}/replies/{replyId}:
    patch:
      summary: Modifier une réponse de courrier (Update courier reply)
      operationId: updateCourierReply
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: replyId
          in: path
          required: true
          type: string
        - name: x-org-id
          in: header
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              documentStatus:
                type: string
                enum: [draft, finalized]
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/CourierReply'

  /organisations/{orgId}/contacts:
    get:
      summary: Lister les contacts externes (List external contacts)
      operationId: listExternalContacts
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: query
          required: false
          type: string
          enum: [personne, entreprise_privee, organisation_publique, ONG, autre]
          description: Filter contacts by structure type
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/ExternalContact'
    post:
      summary: Créer un contact externe (Create external contact)
      operationId: createExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - name
              - structureType
            properties:
              name: { type: string }
              email: { type: string }
              phone: { type: string }
              structureType:
                type: string
                enum: [personne, entreprise_privee, organisation_publique, ONG, autre]
              idNumber: { type: string }
              address: { type: string }
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/ExternalContact'

  /organisations/{orgId}/contacts/{id}:
    get:
      summary: Voir un contact externe (Show external contact)
      operationId: getExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/ExternalContact'
    patch:
      summary: Modifier un contact externe (Update external contact)
      operationId: updateExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              name: { type: string }
              email: { type: string }
              phone: { type: string }
              structureType:
                type: string
                enum: [personne, entreprise_privee, organisation_publique, ONG, autre]
              idNumber: { type: string }
              address: { type: string }
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/ExternalContact'
    delete:
      summary: Supprimer un contact externe (Delete external contact)
      operationId: deleteExternalContact
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              message: { type: string }

  /plans:
    get:
      summary: Lister les plans actifs (List active plans)
      operationId: listActivePlans
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/Plan'

  /plans/{planId}:
    get:
      summary: Voir un plan actif (Show active plan)
      operationId: showActivePlan
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Plan'
        '404':
          description: Plan not found

  /organisations/{orgId}/subscription:
    get:
      summary: Voir l'abonnement actif (Show active subscription and usage)
      operationId: getOrganisationSubscription
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: S'abonner à un plan (Subscribe to a plan)
      operationId: subscribeToPlan
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - planId
            properties:
              planId:
                type: string
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Subscription'
              message: { type: string }

  /organisations/{orgId}/licenses:
    get:
      summary: Lister les licences de sièges (List seat licenses)
      operationId: listSeatLicenses
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/licenses/assign:
    post:
      summary: Assigner une licence de siège (Assign seat license)
      operationId: assignSeatLicense
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/License'

  /organisations/{orgId}/licenses/revoke:
    post:
      summary: Révoquer une licence de siège (Revoke seat license)
      operationId: revokeSeatLicense
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
      responses:
        '200':
          description: Success

  /admin/plans:
    get:
      summary: Lister les plans (Admin)
      operationId: adminListPlans
      responses:
        '200':
          description: Success
    post:
      summary: Créer un plan (Admin)
      operationId: adminCreatePlan
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Plan'
      responses:
        '201':
          description: Created

  /admin/plans/{planId}:
    patch:
      summary: Modifier un plan (Admin)
      operationId: adminUpdatePlan
      parameters:
        - name: planId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              name: { type: string }
              slug: { type: string }
              description: { type: string }
              price: { type: number }
              maxMembers: { type: integer }
              maxStorageMB: { type: integer }
              maxCouriersPerMonth: { type: integer }
              maxModules: { type: integer }
              allowedModules:
                type: array
                items: { type: string }
              features:
                type: array
                items: { type: string }
              isActive: { type: boolean }
              sortOrder: { type: integer }
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un plan (Admin)
      operationId: adminDeletePlan
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /admin/plans/{planId}/usage:
    get:
      summary: Voir l'utilisation d'un plan (Admin - Get plan usage)
      operationId: adminGetPlanUsage
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  planId: { type: string }
                  planName: { type: string }
                  issuedSubscriptions: { type: integer }

  /admin/subscriptions:
    get:
      summary: Lister les abonnements (Admin)
      operationId: adminListSubscriptions
      responses:
        '200':
          description: Success
    post:
      summary: Émettre un abonnement (Admin)
      operationId: adminIssueSubscription
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - planId
              - orgId
              - totalSeatsPurchased
            properties:
              planId: { type: string }
              orgId: { type: string }
              totalSeatsPurchased: { type: integer }
              expiresAt: { type: string }
              notes: { type: string }
      responses:
        '201':
          description: Created

  /admin/subscriptions/{subscriptionId}:
    patch:
      summary: Modifier un abonnement (Admin)
      operationId: adminUpdateSubscription
      parameters:
        - name: subscriptionId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              isActive: { type: boolean }
              totalSeatsPurchased: { type: integer }
              expiresAt: { type: string }
              notes: { type: string }
      responses:
        '200':
          description: Success

definitions:
  Courier:
    type: object
    properties:
      id: { type: string }
      type: { type: string, enum: [incoming, outgoing, internal] }
      urgency: { type: string, enum: [normal, urgent, very_urgent] }
      subject: { type: string }
      receivedAt: { type: string }
      emittedAt: { type: string }
      senderName: { type: string }
      senderEmail: { type: string }
      senderPhone: { type: string }
      externalContactId: { type: string }
      externalContactType:
        { type: string, enum: [personne, entreprise_privee, organisation_publique, ONG, autre] }
      targetType: { type: string, enum: [user, department] }
      entityIds:
        type: array
        items: { type: string }
      fileUrls:
        type: array
        items: { type: string }
      fileIds:
        type: array
        items: { type: string }
      status: { type: string }
      isFavorite: { type: boolean }
      isArchived: { type: boolean }
      isDeleted: { type: boolean }
      replyCount: { type: integer }
      createdAt: { type: string }
      updatedAt: { type: string }

  Plan:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      slug: { type: string }
      description: { type: string }
      price: { type: number }
      maxMembers: { type: integer }
      maxStorageMB: { type: integer }
      maxCouriersPerMonth: { type: integer }
      maxModules: { type: integer }
      allowedModules:
        type: array
        items: { type: string }
      features:
        type: array
        items: { type: string }
      isActive: { type: boolean }
      sortOrder: { type: integer }

  Subscription:
    type: object
    properties:
      id: { type: string }
      planId: { type: string }
      orgId: { type: string }
      activatedAt: { type: string }
      expiresAt: { type: string }
      isActive: { type: boolean }
      totalSeatsPurchased: { type: integer }
      issuedBy: { type: string }

  License:
    type: object
    properties:
      id: { type: string }
      subscriptionId: { type: string }
      orgId: { type: string }
      userId: { type: string }
      assignedBy: { type: string }
      assignedAt: { type: string }
      isActive: { type: boolean }

  UserProfile:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      email: { type: string }
      phone: { type: string }
      avatarUrl: { type: string }
      signatureUrl: { type: string }

  OrganisationProfileItem:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      logoUrl: { type: string }
      roles:
        type: array
        items: { type: string }
      subscriptionStatus: { type: string }
      hasActiveSubscription: { type: boolean }
      hasValidLicense: { type: boolean }
      planName: { type: string }
      planSlug: { type: string }
      expiresAt: { type: string }
      daysRemaining: { type: integer }

  ProfileResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          user:
            $ref: '#/definitions/UserProfile'
          organisations:
            type: array
            items:
              $ref: '#/definitions/OrganisationProfileItem'

  ExternalContact:
    type: object
    properties:
      $id: { type: string }
      $createdAt: { type: string }
      name: { type: string }
      email: { type: string }
      phone: { type: string }
      structureType:
        type: string
        enum: [personne, entreprise_privee, organisation_publique, ONG, autre]
      idNumber: { type: string }
      address: { type: string }
      createdBy: { type: string }

  CourierUploadTarget:
    type: object
    properties:
      fileId: { type: string }
      fileName: { type: string }
      contentType: { type: string }
      size: { type: integer }
      bucketId: { type: string }
      projectId: { type: string }
      uploadUrl: { type: string }
      method: { type: string, enum: [POST] }
      expiresInSeconds: { type: integer }

  CourierMessage:
    type: object
    properties:
      id: { type: string }
      courierId: { type: string }
      content: { type: string }
      fileUrl: { type: string }
      fileId: { type: string }
      createdBy: { type: string }
      createdAt: { type: string }

  CourierReply:
    type: object
    properties:
      id: { type: string }
      courierId: { type: string }
      content: { type: string }
      fileUrl: { type: string }
      fileId: { type: string }
      createdBy: { type: string }
      createdAt: { type: string }
      documentStatus:
        type: string
        enum: [draft, finalized]
