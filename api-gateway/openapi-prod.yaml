definitions:
  Courier:
    type: object
    properties:
      id: { type: string }
      type: { type: string, enum: [incoming, outgoing, internal] }
      urgency: { type: string, enum: [normal, urgent, very_urgent] }
      subject: { type: string }
      receivedAt: { type: string }
      emittedAt: { type: string }
      correspondent:
        type: object
        properties:
          id: { type: string }
          type: { type: string }
          name: { type: string }
          email: { type: string }
          phone: { type: string }
      deliverer:
        type: object
        properties:
          name: { type: string }
          email: { type: string }
          phone: { type: string }
      targetType: { type: string, enum: [user, department] }
      entityIds:
        type: array
        items: { type: string }
      fileUrls:
        type: array
        items: { type: string }
      fileIds:
        type: array
        items: { type: string }
      status: { type: string }
      isFavorite: { type: boolean }
      isArchived: { type: boolean }
      isDeleted: { type: boolean }
      replyCount: { type: integer }
      currentCustody: { type: string, enum: [courier_service, sender, recipient, dispatched] }
      custodyUserId: { type: string }
      custodyDeptId: { type: string }
      requiresPickup: { type: boolean }
      pickedUpAt: { type: string }
      pickedUpBy: { type: string }
      signedProofFileId: { type: string }
      dispatchedAt: { type: string }
      dispatchedBy: { type: string }
      receivedBy: { type: string }
      handlerUserId: { type: string }
      handler:
        type: object
        properties:
          id: { type: string }
          name: { type: string }
          avatarUrl: { type: string }
      createdAt: { type: string }
      updatedAt: { type: string }

  CourierActivity:
    type: object
    properties:
      id: { type: string }
      courierId: { type: string }
      action:
        {
          type: string,
          enum:
            [
              created,
              updated,
              assigned,
              picked_up,
              handed_over,
              dispatched,
              status_changed,
              archived,
              restored,
              deleted,
              replied,
              handler_assigned,
            ],
        }
      performedBy:
        type: object
        properties:
          id: { type: string }
          name: { type: string }
          avatarUrl: { type: string }
      details: { type: string }
      createdAt: { type: string }

  Plan:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      slug: { type: string }
      description: { type: string }
      price: { type: number }
      maxMembers: { type: integer }
      maxStorageMB: { type: integer }
      maxCouriersPerMonth: { type: integer }
      maxModules: { type: integer }
      allowedModules:
        type: array
        items: { type: string }
      features:
        type: array
        items: { type: string }
      isActive: { type: boolean }
      sortOrder: { type: integer }

  Subscription:
    type: object
    properties:
      id: { type: string }
      planId: { type: string }
      orgId: { type: string }
      activatedAt: { type: string }
      expiresAt: { type: string }
      isActive: { type: boolean }
      totalSeatsPurchased: { type: integer }
      issuedBy: { type: string }

  License:
    type: object
    properties:
      id: { type: string }
      subscriptionId: { type: string }
      orgId: { type: string }
      userId: { type: string }
      assignedBy: { type: string }
      assignedAt: { type: string }
      isActive: { type: boolean }

  UserProfile:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      email: { type: string }
      phone: { type: string }
      avatarUrl: { type: string }
      signatureUrl: { type: string }

  OrganisationProfileItem:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      logoUrl: { type: string }
      roles:
        type: array
        items: { type: string }
      subscriptionStatus: { type: string }
      hasActiveSubscription: { type: boolean }
      hasValidLicense: { type: boolean }
      planName: { type: string }
      planSlug: { type: string }
      expiresAt: { type: string }
      daysRemaining: { type: integer }

  ProfileResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          user:
            $ref: '#/definitions/UserProfile'
          organisations:
            type: array
            items:
              $ref: '#/definitions/OrganisationProfileItem'

  ExternalContact:
    type: object
    properties:
      $id: { type: string }
      $createdAt: { type: string }
      name: { type: string }
      email: { type: string }
      phone: { type: string }
      structureType:
        type: string
        enum: [physique, privee, publique, ong, autre]
      structureName: { type: string }
      idNumber: { type: string }
      address: { type: string }
      createdBy: { type: string }

  CourierMessage:
    type: object
    properties:
      id: { type: string }
      courierId: { type: string }
      content: { type: string }
      fileUrl: { type: string }
      fileId: { type: string }
      createdBy: { type: string }
      createdAt: { type: string }

  CourierReply:
    type: object
    properties:
      id: { type: string }
      courierId: { type: string }
      content: { type: string }
      fileUrl: { type: string }
      fileId: { type: string }
      createdBy: { type: string }
      createdAt: { type: string }
      documentStatus:
        type: string
        enum: [draft, finalized]
