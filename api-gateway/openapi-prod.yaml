swagger: '2.0'
info:
  title: Bara API - Production
  description: API Gateway Specification for Bara API (Production Environment)
  version: 1.0.0
schemes:
  - https
produces:
  - application/json

securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header

x-google-backend:
  # TODO: Replace this with your production Cloud Run URL
  # The /api/v1 suffix will automatically be prepended to all paths below
  address: '{{CLOUD_RUN_URL}}/api/v1'
  path_translation: APPEND_PATH_TO_ADDRESS

x-google-management:
  metrics:
    - name: 'all-requests'
      displayName: 'Total Requests'
      valueType: INT64
      metricKind: DELTA
    - name: 'auth-requests'
      displayName: 'Authentication Requests'
      valueType: INT64
      metricKind: DELTA
  quota:
    limits:
      - name: 'all-limit'
        metric: 'all-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 1000
      - name: 'auth-limit'
        metric: 'auth-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 20

paths:
  /:
    get:
      summary: Health Check
      operationId: healthCheck
      # We override the backend here because the health check is at the root (/), not /api/v1/
      x-google-backend:
        address: '{{CLOUD_RUN_URL}}/'
        path_translation: CONSTANT_ADDRESS
      responses:
        '200':
          description: Success
  /auth/signup:
    post:
      summary: Inscription (Signup)
      operationId: signup
      x-google-quota:
        metricCosts:
          'auth-requests': 1
      responses:
        '200':
          description: Success
        '201':
          description: Created
  /auth/profile:
    get:
      summary: Profil Utilisateur (Profile)
      operationId: getProfile
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
  /auth/profile/avatar:
    post:
      summary: Uploader un Avatar
      operationId: uploadAvatar
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: avatar
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer l'Avatar
      operationId: deleteAvatar
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /organisations:
    get:
      summary: Lister les organisations
      operationId: listOrganisations
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
    post:
      summary: Créer une organisation
      operationId: createOrganisation
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
        '201':
          description: Created
  /organisations/{orgId}:
    get:
      summary: Voir une organisation
      operationId: getOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Mettre à jour une organisation
      operationId: updateOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer une organisation
      operationId: deleteOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /organisations/{orgId}/logo:
    post:
      summary: Uploader le Logo
      operationId: uploadOrganisationLogo
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: logo
          in: formData
          type: file
          required: true
      responses:
        '200':
          description: Success
  /organisations/{orgId}/members:
    get:
      summary: Lister les membres
      operationId: listMembers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Ajouter un membre
      operationId: addMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '201':
          description: Created
  /organisations/{orgId}/members/{memberId}:
    get:
      summary: Voir un membre
      operationId: getMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier les rôles d'un membre
      operationId: updateMemberRoles
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Retirer un membre
      operationId: removeMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: memberId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /modules:
    get:
      summary: Lister les modules disponibles
      operationId: listAvailableModules
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /organisations/{orgId}/modules:
    get:
      summary: Lister les modules actifs
      operationId: listActiveModules
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Activer un module
      operationId: activateModule
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/modules/{module}:
    delete:
      summary: Désactiver un module
      operationId: deactivateModule
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: module
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /admin/marketplace:
    post:
      summary: Publier un module
      operationId: publishModule
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /admin/marketplace/{moduleName}:
    delete:
      summary: Dépublier un module
      operationId: unpublishModule
      security:
        - BearerAuth: []
      parameters:
        - name: moduleName
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/departments:
    get:
      summary: Lister les départements
      operationId: listDepartments
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Créer un département
      operationId: createDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '201':
          description: Created
  /organisations/{orgId}/departments/{id}:
    get:
      summary: Voir un département
      operationId: getDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier un département
      operationId: updateDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un département
      operationId: deleteDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/members/{membershipId}/department:
    post:
      summary: Assigner à un département
      operationId: assignMemberToDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: membershipId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/departments/{id}/members:
    get:
      summary: Lister les membres d'un département
      operationId: listDepartmentMembers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/profiles/{id}:
    delete:
      summary: Retirer d'un département
      operationId: unassignMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/couriers:
    get:
      summary: Lister les courriers
      operationId: listCouriers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: query
          required: false
          type: string
          enum: [incoming, outgoing]
        - name: archived
          in: query
          required: false
          type: string
          enum: ['true', 'false']
        - name: favorite
          in: query
          required: false
          type: string
          enum: ['true', 'false']
      responses:
        '200':
          description: Success
    post:
      summary: Créer un courrier
      operationId: createCourier
      security:
        - BearerAuth: []
      consumes:
        - multipart/form-data
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: formData
          type: string
          enum: [incoming, outgoing]
          required: true
        - name: urgency
          in: formData
          type: string
          enum: [normal, urgent, very_urgent]
          required: true
        - name: subject
          in: formData
          type: string
          required: true
        - name: senderName
          in: formData
          type: string
          required: true
        - name: senderNumber
          in: formData
          type: string
          required: true
        - name: senderStructureType
          in: formData
          type: string
          enum: [physique, privee, publique, ong, autre]
        - name: senderStructureName
          in: formData
          type: string
        - name: senderIdNumber
          in: formData
          type: string
        - name: senderPhone
          in: formData
          type: string
        - name: senderEmail
          in: formData
          type: string
        - name: assignedTo
          in: formData
          type: string
          required: true
        - name: targetType
          in: formData
          type: string
          enum: [user, department]
          required: true
        - name: file
          in: formData
          type: file
      responses:
        '201':
          description: Created
  /organisations/{orgId}/couriers/{id}:
    get:
      summary: Voir un courrier
      operationId: getCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un courrier
      operationId: updateCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un courrier
      operationId: deleteCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Courier'

  /plans:
    get:
      summary: Lister les plans actifs (List active plans)
      operationId: listActivePlans
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/definitions/Plan'

  /plans/{planId}:
    get:
      summary: Voir un plan actif (Show active plan)
      operationId: showActivePlan
      security:
        - BearerAuth: []
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Plan'
        '404':
          description: Plan not found

  /organisations/{orgId}/subscription:
    get:
      summary: Voir l'abonnement actif (Show active subscription and usage)
      operationId: getOrganisationSubscription
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: S'abonner à un plan (Subscribe to a plan)
      operationId: subscribeToPlan
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - planId
            properties:
              planId:
                type: string
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Subscription'
              message: { type: string }

  /organisations/{orgId}/licenses:
    get:
      summary: Lister les licences de sièges (List seat licenses)
      operationId: listSeatLicenses
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/licenses/assign:
    post:
      summary: Assigner une licence de siège (Assign seat license)
      operationId: assignSeatLicense
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/License'

  /organisations/{orgId}/licenses/revoke:
    post:
      summary: Révoquer une licence de siège (Revoke seat license)
      operationId: revokeSeatLicense
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
            properties:
              userId:
                type: string
      responses:
        '200':
          description: Success

  /admin/plans:
    get:
      summary: Lister les plans (Admin)
      operationId: adminListPlans
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
    post:
      summary: Créer un plan (Admin)
      operationId: adminCreatePlan
      security:
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: '#/definitions/Plan'
      responses:
        '201':
          description: Created

  /admin/plans/{planId}:
    patch:
      summary: Modifier un plan (Admin)
      operationId: adminUpdatePlan
      security:
        - BearerAuth: []
      parameters:
        - name: planId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              name: { type: string }
              slug: { type: string }
              description: { type: string }
              price: { type: number }
              maxMembers: { type: integer }
              maxStorageMB: { type: integer }
              maxCouriersPerMonth: { type: integer }
              maxModules: { type: integer }
              allowedModules:
                type: array
                items: { type: string }
              features:
                type: array
                items: { type: string }
              isActive: { type: boolean }
              sortOrder: { type: integer }
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un plan (Admin)
      operationId: adminDeletePlan
      security:
        - BearerAuth: []
      parameters:
        - name: planId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /admin/subscriptions:
    get:
      summary: Lister les abonnements (Admin)
      operationId: adminListSubscriptions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
    post:
      summary: Émettre un abonnement (Admin)
      operationId: adminIssueSubscription
      security:
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - planId
              - orgId
              - totalSeatsPurchased
            properties:
              planId: { type: string }
              orgId: { type: string }
              totalSeatsPurchased: { type: integer }
              expiresAt: { type: string }
              notes: { type: string }
      responses:
        '201':
          description: Created

  /admin/subscriptions/{subscriptionId}:
    patch:
      summary: Modifier un abonnement (Admin)
      operationId: adminUpdateSubscription
      security:
        - BearerAuth: []
      parameters:
        - name: subscriptionId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              isActive: { type: boolean }
              totalSeatsPurchased: { type: integer }
              expiresAt: { type: string }
              notes: { type: string }
      responses:
        '200':
          description: Success

definitions:
  Courier:
    type: object
    properties:
      id: { type: string }
      type: { type: string, enum: [incoming, outgoing] }
      urgency: { type: string, enum: [normal, urgent, very_urgent] }
      subject: { type: string }
      senderName: { type: string }
      senderNumber: { type: string }
      senderStructureType: { type: string, enum: [physique, privee, publique, ong, autre] }
      senderStructureName: { type: string }
      senderIdNumber: { type: string }
      senderPhone: { type: string }
      senderEmail: { type: string }
      assignedTo: { type: string }
      targetType: { type: string, enum: [user, department] }
      fileUrl: { type: string }
      status: { type: string }
      isFavorite: { type: boolean }
      isArchived: { type: boolean }
      createdAt: { type: string }
      updatedAt: { type: string }

  Plan:
    type: object
    properties:
      id: { type: string }
      name: { type: string }
      slug: { type: string }
      description: { type: string }
      price: { type: number }
      maxMembers: { type: integer }
      maxStorageMB: { type: integer }
      maxCouriersPerMonth: { type: integer }
      maxModules: { type: integer }
      allowedModules:
        type: array
        items: { type: string }
      features:
        type: array
        items: { type: string }
      isActive: { type: boolean }
      sortOrder: { type: integer }

  Subscription:
    type: object
    properties:
      id: { type: string }
      planId: { type: string }
      orgId: { type: string }
      activatedAt: { type: string }
      expiresAt: { type: string }
      isActive: { type: boolean }
      totalSeatsPurchased: { type: integer }
      issuedBy: { type: string }

  License:
    type: object
    properties:
      id: { type: string }
      subscriptionId: { type: string }
      orgId: { type: string }
      userId: { type: string }
      assignedBy: { type: string }
      assignedAt: { type: string }
      isActive: { type: boolean }
