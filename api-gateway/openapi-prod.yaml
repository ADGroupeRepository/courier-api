swagger: '2.0'
info:
  title: Bara API - Production
  description: API Gateway Specification for Bara API (Production Environment)
  version: 1.0.0
schemes:
  - https
produces:
  - application/json

securityDefinitions:
  BearerAuth:
    type: apiKey
    name: Authorization
    in: header

x-google-backend:
  # TODO: Replace this with your production Cloud Run URL
  # The /api/v1 suffix will automatically be prepended to all paths below
  address: '{{CLOUD_RUN_URL}}/api/v1'
  path_translation: APPEND_PATH_TO_ADDRESS

x-google-management:
  metrics:
    - name: 'all-requests'
      displayName: 'Total Requests'
      valueType: INT64
      metricKind: DELTA
    - name: 'auth-requests'
      displayName: 'Authentication Requests'
      valueType: INT64
      metricKind: DELTA
  quota:
    limits:
      - name: 'all-limit'
        metric: 'all-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 1000
      - name: 'auth-limit'
        metric: 'auth-requests'
        unit: '1/min/{project}'
        values:
          STANDARD: 20

paths:
  /auth/signup:
    post:
      summary: Inscription (Signup)
      operationId: signup
      x-google-quota:
        metricCosts:
          'auth-requests': 1
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - name
              - email
              - password
            properties:
              name:
                type: string
              email:
                type: string
              phone:
                type: string
              password:
                type: string
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /auth/forgot-password:
    post:
      summary: Demander la réinitialisation du mot de passe (Request password reset)
      operationId: requestPasswordReset
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
              redirectUrl:
                type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Confirmer la réinitialisation du mot de passe (Confirm password reset)
      operationId: confirmPasswordReset
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
              - secret
              - password
            properties:
              userId:
                type: string
              secret:
                type: string
              password:
                type: string
      responses:
        '200':
          description: Success

  /auth/forgot-password/verify:
    post:
      summary: Vérifier l'OTP de réinitialisation du mot de passe (Verify password reset OTP)
      operationId: verifyPasswordResetOtp
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - email
              - otp
            properties:
              email:
                type: string
                format: email
              otp:
                type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  token:
                    type: string

  /auth/forgot-password/reset:
    post:
      summary: Réinitialiser le mot de passe (Reset password)
      operationId: resetPassword
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - token
              - password
              - password_confirmation
            properties:
              token:
                type: string
              password:
                type: string
              password_confirmation:
                type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  reset:
                    type: boolean

  /auth/verify-email:
    post:
      summary: Demander la vérification de l'email (Request email verification)
      operationId: requestEmailVerification
      security:
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            properties:
              redirectUrl:
                type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Confirmer la vérification de l'email (Confirm email verification)
      operationId: confirmEmailVerification
      security:
        - BearerAuth: []
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - userId
              - secret
            properties:
              userId:
                type: string
              secret:
                type: string
      responses:
        '200':
          description: Success
  /auth/profile:
    get:
      summary: Profil Utilisateur (Profile)
      operationId: getProfile
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ProfileResponse'
    patch:
      summary: Mettre à jour le profil (Update Profile)
      operationId: updateProfile
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: formData
          required: false
          type: string
        - name: phone
          in: formData
          required: false
          type: string
        - name: avatar
          in: formData
          required: false
          type: file
        - name: signature
          in: formData
          required: false
          type: file
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/ProfileResponse'

  /auth/push-token:
    post:
      summary: Enregistrer un token de notification (Register Push Token)
      operationId: registerPushToken
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          'all-requests': 1
      parameters:
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - token
            properties:
              token:
                type: string
                description: Token FCM ou jeton de l'appareil.
              providerType:
                type: string
                enum: [push, email, sms]
                description: Type de fournisseur.
              providerId:
                type: string
                description: Identifiant du fournisseur.
              name:
                type: string
                description: Nom de l'appareil ou description.
      responses:
        '200':
          description: Jeton enregistré avec succès.

  /organisations:
    get:
      summary: Lister les organisations
      operationId: listOrganisations
      security:
        - BearerAuth: []
      x-google-quota:
        metricCosts:
          'all-requests': 1
      responses:
        '200':
          description: Success
    post:
      summary: Créer une organisation
      operationId: createOrganisation
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
        '201':
          description: Created
  /organisations/{orgId}:
    get:
      summary: Voir une organisation
      operationId: getOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Mettre à jour une organisation
      operationId: updateOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Mettre à jour une organisation (Patch)
      operationId: patchOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer une organisation
      operationId: deleteOrganisation
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content

  /organisations/{orgId}/members:
    get:
      summary: Lister les membres
      operationId: listMembers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Ajouter un membre
      operationId: addMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '201':
          description: Created

  /organisations/{orgId}/members/{userId}:
    get:
      summary: Voir un membre
      operationId: getMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: userId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier les rôles d'un membre
      operationId: updateMemberRoles
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: userId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier les rôles d'un membre (Patch)
      operationId: patchMemberRoles
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: userId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Retirer un membre
      operationId: removeMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: userId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
        '204':
          description: No Content
  /modules:
    get:
      summary: Lister les modules disponibles
      operationId: listAvailableModules
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /organisations/{orgId}/modules:
    get:
      summary: Lister les modules actifs
      operationId: listActiveModules
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/modules/{module}:
    delete:
      summary: Désactiver un module
      operationId: deactivateModule
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: module
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /admin/marketplace:
    post:
      summary: Publier un module
      operationId: publishModule
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success
  /admin/marketplace/{moduleName}:
    delete:
      summary: Dépublier un module
      operationId: unpublishModule
      security:
        - BearerAuth: []
      parameters:
        - name: moduleName
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/departments:
    get:
      summary: Lister les départements
      operationId: listDepartments
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    post:
      summary: Créer un département
      operationId: createDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '201':
          description: Created
  /organisations/{orgId}/departments/{id}:
    get:
      summary: Voir un département
      operationId: getDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    put:
      summary: Modifier un département
      operationId: updateDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un département (Patch)
      operationId: patchDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un département
      operationId: deleteDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/members/{membershipId}/department:
    post:
      summary: Assigner à un département
      operationId: assignMemberToDepartment
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: membershipId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/departments/{id}/members:
    get:
      summary: Lister les membres d'un département
      operationId: listDepartmentMembers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
  /organisations/{orgId}/profiles/{id}:
    delete:
      summary: Retirer d'un département
      operationId: unassignMember
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/notifications/read-all:
    patch:
      summary: Marquer toutes les notifications comme lues (Mark all notifications as read)
      operationId: markAllNotificationsAsRead
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/notifications/{id}/read:
    patch:
      summary: Marquer une notification comme lue (Mark notification as read)
      operationId: markNotificationAsRead
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success

  /organisations/{orgId}/notifications:
    delete:
      summary: Supprimer des notifications en bloc (Delete notifications in bulk)
      operationId: deleteNotifications
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - ids
            properties:
              ids:
                type: array
                items:
                  type: string
      responses:
        '204':
          description: No Content
        '200':
          description: Success

  /organisations/{orgId}/notifications/{id}:
    delete:
      summary: Supprimer une notification (Delete single notification)
      operationId: deleteNotification
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '204':
          description: No Content
        '200':
          description: Success

  /organisations/{orgId}/couriers:
    get:
      summary: Lister les courriers
      operationId: listCouriers
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: type
          in: query
          required: false
          type: string
          enum: [incoming, outgoing, internal]
        - name: archived
          in: query
          required: false
          type: string
          enum: ['true', 'false']
        - name: favorite
          in: query
          required: false
          type: string
          enum: ['true', 'false']
      responses:
        '200':
          description: Success
    post:
      summary: Créer un courrier
      operationId: createCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
      responses:
        '201':
          description: Created
  /organisations/{orgId}/couriers/{id}:
    get:
      summary: Voir un courrier
      operationId: getCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    patch:
      summary: Modifier un courrier
      operationId: updateCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Supprimer un courrier
      operationId: deleteCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            $ref: '#/definitions/Courier'

  /organisations/{orgId}/couriers/{id}/force:
    delete:
      summary: Supprimer définitivement un courrier (Force delete courier)
      operationId: forceDeleteCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/restore:
    post:
      summary: Restaurer un courrier du panier (Restore courier from bin)
      operationId: restoreCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Courier'
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/pickup:
    post:
      summary: Enregistrer la collecte physique d'un courrier (Register courier pickup)
      operationId: pickupCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Courier'
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/handover:
    post:
      summary: Enregistrer la remise physique d'un courrier (Register courier handover)
      operationId: handoverCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: false
          schema:
            type: object
            properties:
              recipientUserId:
                type: string
              recipientDeptId:
                type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Courier'
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/dispatch:
    post:
      summary: Enregistrer l'expédition externe d'un courrier (Register courier dispatch)
      operationId: dispatchCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - signedProofFileId
            properties:
              signedProofFileId:
                type: string
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Courier'
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/impute:
    post:
      summary: Assigner un responsable à un courrier (Assign handler/imputer)
      operationId: imputeCourier
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: body
          in: body
          required: true
          schema:
            type: object
            required:
              - handlerUserId
            properties:
              handlerUserId:
                type: string
              urgency:
                type: string
                enum: [normal, urgent, very_urgent]
              instruction:
                type: string
                maxLength: 2000
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              data:
                $ref: '#/definitions/Courier'
              message: { type: string }

  /organisations/{orgId}/couriers/{id}/activities:
    get:
      summary: Obtenir l'historique d'activité d'un courrier (List courier activities)
      operationId: listCourierActivities
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
        - name: page
          in: query
          required: false
          type: integer
      responses:
        '200':
          description: Success
          schema:
            type: object
            properties:
              total: { type: integer }
              limit: { type: integer }
              page: { type: integer }
              lastPage: { type: integer }
              data:
                type: array
                items:
                  $ref: '#/definitions/CourierActivity'

  /organisations/{orgId}/couriers/{id}/messages:
    post:
      summary: Envoyer un message de chat pour un courrier (Send courier chat message)
      operationId: createCourierMessage
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/CourierMessage'

  /organisations/{orgId}/couriers/{id}/replies:
    get:
      summary: Lister les réponses d'un courrier (List courier replies)
      operationId: listCourierReplies
      security:
        - BearerAuth: []
      parameters:
        - name: orgId
          in: path
          required: true
          type: string
        - name: id
          in: path
          required: true
          type: string
        - name: limit
          in: query
          required: false
          type: integer
        - name: offset
          in: query
          required: false
          type: integer
        - name: x-org-id
          in: header
          required: true
          type: string
      responses:
        '200':
          description: Success
          schema:
