name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - develop
      - main

env:
  PROJECT_ID: courier-management-501610
  REGION: europe-west1
  REPOSITORY: courier-api
  IMAGE: courier-api
  SERVICE: courier-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set GCP Project
        run: |
          gcloud config set project ${{ env.PROJECT_ID }}
      
      - name: Set Environment Variables
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "TFVARS=environments/dev.tfvars" >> $GITHUB_ENV
            echo "ENVIRONMENT=dev" >> $GITHUB_ENV
            echo "TF_STATE_PREFIX=dev" >> $GITHUB_ENV
          else
            echo "TFVARS=environments/prod.tfvars" >> $GITHUB_ENV
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            echo "TF_STATE_PREFIX=prod" >> $GITHUB_ENV
          fi    
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check   

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=courier-tf-state" \
            -backend-config="prefix=${TF_STATE_PREFIX}"

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Docker Authentication
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}-${ENVIRONMENT}:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}-${ENVIRONMENT}:${{ github.sha }}
      
      - name: Terraform Plan
        run: |
          terraform -chdir=terraform plan \
            -input=false
            -var-file=${TFVARS} \
            -var="image_tag=${{ github.sha }}"
      
      - name: Terraform Apply
        run: |
          terraform -chdir=terraform apply \
            -input=false
            -auto-approve \
            -var-file=${TFVARS} \
            -var="image_tag=${{ github.sha }}"